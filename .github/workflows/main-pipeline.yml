name: Main Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: main-pipeline-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  K8S_NAMESPACE: airbnb-chatbot
  HAS_GHCR_CREDS: ${{ secrets.GHCR_USERNAME != '' && secrets.GHCR_PAT != '' }}

jobs:
  backend:
    name: Backend tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Check out the repo
        uses: actions/checkout@v5

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Run backend tests
        run: mvn -B test

  frontend:
    name: Frontend checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Check out the repo
        uses: actions/checkout@v5

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Build the frontend
        run: npm run build

      - name: Lint the frontend
        run: npm run lint

  manifests:
    name: Kubernetes manifest validation
    runs-on: ubuntu-latest

    steps:
      - name: Check out the repo
        uses: actions/checkout@v5

      - name: Validate Kubernetes manifests
        run: |
          docker run --rm -v "$PWD:/work" ghcr.io/yannh/kubeconform:latest \
            -summary \
            /work/k8s/namespace.yaml \
            /work/k8s/postgres.yaml \
            /work/k8s/backend.yaml \
            /work/k8s/frontend.yaml

  publish:
    name: Publish ${{ matrix.service }} image
    needs:
      - backend
      - frontend
      - manifests
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: backend
            dockerfile: docker/Dockerfile.backend
            image_suffix: backend
          - service: frontend
            dockerfile: docker/Dockerfile.frontend
            image_suffix: frontend

    steps:
      - name: Check out the repo
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image name
        id: prep
        shell: bash
        run: |
          REPO_LOWER="$(printf '%s' "$GITHUB_REPOSITORY" | tr '[:upper:]' '[:lower:]')"
          echo "image=ghcr.io/${REPO_LOWER}-${{ matrix.image_suffix }}" >> "$GITHUB_OUTPUT"

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.prep.outputs.image }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=long,prefix=sha-

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    name: Deploy to local Kubernetes
    needs: publish
    runs-on:
      - self-hosted
      - local-k8s

    steps:
      - name: Check out the repo
        uses: actions/checkout@v5

      - name: Resolve image references
        id: vars
        shell: bash
        run: |
          REPO_LOWER="$(printf '%s' "$GITHUB_REPOSITORY" | tr '[:upper:]' '[:lower:]')"
          IMAGE_TAG="sha-${GITHUB_SHA}"
          IMAGE_BASE="ghcr.io/${REPO_LOWER}"
          {
            echo "image_tag=${IMAGE_TAG}"
            echo "backend_image=${IMAGE_BASE}-backend:${IMAGE_TAG}"
            echo "frontend_image=${IMAGE_BASE}-frontend:${IMAGE_TAG}"
          } >> "$GITHUB_OUTPUT"

      - name: Show Kubernetes context
        run: |
          kubectl config current-context
          kubectl cluster-info

      - name: Ensure namespace exists
        run: kubectl apply -f k8s/namespace.yaml

      - name: Create app secrets
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          kubectl -n "$K8S_NAMESPACE" create secret generic app-secrets \
            --from-literal=openai-api-key="$OPENAI_API_KEY" \
            --from-literal=postgres-user="postgres" \
            --from-literal=postgres-password="postgres" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Create GHCR pull secret
        if: ${{ env.HAS_GHCR_CREDS == 'true' }}
        env:
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_PAT: ${{ secrets.GHCR_PAT }}
        run: |
          kubectl -n "$K8S_NAMESPACE" create secret docker-registry ghcr-auth \
            --docker-server=ghcr.io \
            --docker-username="$GHCR_USERNAME" \
            --docker-password="$GHCR_PAT" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Apply Kubernetes manifests
        run: |
          kubectl apply -f k8s/postgres.yaml
          kubectl apply -f k8s/backend.yaml
          kubectl apply -f k8s/frontend.yaml

      - name: Attach GHCR pull secret to deployments
        if: ${{ env.HAS_GHCR_CREDS == 'true' }}
        run: |
          kubectl -n "$K8S_NAMESPACE" patch deployment backend --type='strategic' \
            -p '{"spec":{"template":{"spec":{"imagePullSecrets":[{"name":"ghcr-auth"}]}}}}'
          kubectl -n "$K8S_NAMESPACE" patch deployment frontend --type='strategic' \
            -p '{"spec":{"template":{"spec":{"imagePullSecrets":[{"name":"ghcr-auth"}]}}}}'

      - name: Update deployment images
        run: |
          kubectl -n "$K8S_NAMESPACE" set image deployment/backend \
            backend="${{ steps.vars.outputs.backend_image }}"
          kubectl -n "$K8S_NAMESPACE" set image deployment/frontend \
            frontend="${{ steps.vars.outputs.frontend_image }}"

      - name: Wait for rollouts
        run: |
          kubectl -n "$K8S_NAMESPACE" rollout status deployment/postgres --timeout=180s
          kubectl -n "$K8S_NAMESPACE" rollout status deployment/backend --timeout=180s
          kubectl -n "$K8S_NAMESPACE" rollout status deployment/frontend --timeout=180s

      - name: Show deployed resources
        run: kubectl -n "$K8S_NAMESPACE" get pods,svc
