name: CI

on:
  pull_request:
  push:
    branches-ignore:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Check out the repo
        uses: actions/checkout@v5

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Run backend tests
        run: mvn -B test

  frontend:
    name: Frontend checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Check out the repo
        uses: actions/checkout@v5

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Build the frontend
        run: npm run build

      - name: Lint the frontend
        run: npm run lint

  docker:
    name: Docker build smoke tests
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: backend
            dockerfile: docker/Dockerfile.backend
          - service: frontend
            dockerfile: docker/Dockerfile.frontend

    steps:
      - name: Check out the repo
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build ${{ matrix.service }} image
        run: docker build -f "${{ matrix.dockerfile }}" -t "airbnb-chatbot-${{ matrix.service }}:ci" .

  manifests:
    name: Kubernetes manifest validation
    runs-on: ubuntu-latest

    steps:
      - name: Check out the repo
        uses: actions/checkout@v5

      - name: Validate Kubernetes manifests
        run: |
          docker run --rm -v "$PWD:/work" ghcr.io/yannh/kubeconform:latest \
            -summary \
            /work/k8s/namespace.yaml \
            /work/k8s/postgres.yaml \
            /work/k8s/backend.yaml \
            /work/k8s/frontend.yaml
