  <polygon points="650,306 636,298 636,314" fill="#6B7280"/>

  <line x1="934" y1="274" x2="976" y2="238" stroke="#6B7280" stroke-width="4" stroke-linecap="round"/>
  <polygon points="976,238 960,238 968,252" fill="#6B7280"/>

  <line x1="934" y1="338" x2="976" y2="366" stroke="#6B7280" stroke-width="4" stroke-linecap="round"/>
  <polygon points="976,366 962,354 956,368" fill="#6B7280"/>

  <text x="445" y="218" fill="#5B6470" font-family="Helvetica, Arial, sans-serif" font-size="16">Browser app</text>
  <text x="726" y="218" fill="#5B6470" font-family="Helvetica, Arial, sans-serif" font-size="16">API + AI search</text>

  <rect x="72" y="490" width="1136" height="286" rx="24" fill="#F2F6F9" stroke="#D7E2EA" stroke-width="2"/>
  <text x="98" y="532" fill="#0F766E" font-family="Helvetica, Arial, sans-serif" font-size="22" font-weight="700">Delivery Pipeline</text>

  <rect x="104" y="590" width="188" height="108" rx="22" fill="#FFF7ED" stroke="#FB923C" stroke-width="2"/>
  <text x="198" y="634" text-anchor="middle" fill="#111827" font-family="Helvetica, Arial, sans-serif" font-size="24" font-weight="700">Git Push / PR</text>
  <text x="198" y="664" text-anchor="middle" fill="#6B7280" font-family="Helvetica, Arial, sans-serif" font-size="17">Code changes trigger</text>
  <text x="198" y="688" text-anchor="middle" fill="#6B7280" font-family="Helvetica, Arial, sans-serif" font-size="17">Actions workflows</text>

  <rect x="352" y="566" width="258" height="156" rx="24" fill="#EEF2FF" stroke="#6366F1" stroke-width="2"/>
  <text x="481" y="612" text-anchor="middle" fill="#111827" font-family="Helvetica, Arial, sans-serif" font-size="26" font-weight="700">GitHub Actions</text>
  <text x="481" y="642" text-anchor="middle" fill="#6B7280" font-family="Helvetica, Arial, sans-serif" font-size="18">CI validates backend,</text>
  <text x="481" y="668" text-anchor="middle" fill="#6B7280" font-family="Helvetica, Arial, sans-serif" font-size="18">frontend, Docker builds,</text>
  <text x="481" y="694" text-anchor="middle" fill="#6B7280" font-family="Helvetica, Arial, sans-serif" font-size="18">and Kubernetes manifests</text>

  <rect x="668" y="590" width="188" height="108" rx="22" fill="#ECFDF5" stroke="#10B981" stroke-width="2"/>
  <text x="762" y="634" text-anchor="middle" fill="#111827" font-family="Helvetica, Arial, sans-serif" font-size="24" font-weight="700">GHCR</text>
  <text x="762" y="664" text-anchor="middle" fill="#6B7280" font-family="Helvetica, Arial, sans-serif" font-size="17">Multi-arch frontend</text>
  <text x="762" y="688" text-anchor="middle" fill="#6B7280" font-family="Helvetica, Arial, sans-serif" font-size="17">and backend images</text>

  <rect x="912" y="558" width="256" height="172" rx="24" fill="#FFFBEB" stroke="#EAB308" stroke-width="2"/>
  <text x="1040" y="604" text-anchor="middle" fill="#111827" font-family="Helvetica, Arial, sans-serif" font-size="25" font-weight="700">Local Kubernetes</text>
  <text x="1040" y="634" text-anchor="middle" fill="#6B7280" font-family="Helvetica, Arial, sans-serif" font-size="18">Docker Desktop cluster</text>

  <rect x="948" y="660" width="62" height="40" rx="12" fill="#DBEAFE" stroke="#60A5FA" stroke-width="1.5"/>
  <text x="960" y="686" fill="#1F2937" font-family="Helvetica, Arial, sans-serif" font-size="15" font-weight="700">FE</text>

  <rect x="1010" y="660" width="62" height="40" rx="12" fill="#DCFCE7" stroke="#4ADE80" stroke-width="1.5"/>
  <text x="1020" y="686" fill="#1F2937" font-family="Helvetica, Arial, sans-serif" font-size="15" font-weight="700">API</text>

  <rect x="1072" y="660" width="62" height="40" rx="12" fill="#FEE2E2" stroke="#F87171" stroke-width="1.5"/>
  <text x="1080" y="686" fill="#1F2937" font-family="Helvetica, Arial, sans-serif" font-size="15" font-weight="700">DB</text>

  <line x1="292" y1="644" x2="352" y2="644" stroke="#6B7280" stroke-width="4" stroke-linecap="round"/>
  <polygon points="352,644 338,636 338,652" fill="#6B7280"/>

  <line x1="610" y1="644" x2="668" y2="644" stroke="#6B7280" stroke-width="4" stroke-linecap="round"/>
  <polygon points="668,644 654,636 654,652" fill="#6B7280"/>

  <line x1="856" y1="644" x2="912" y2="644" stroke="#6B7280" stroke-width="4" stroke-linecap="round"/>
  <polygon points="912,644 898,636 898,652" fill="#6B7280"/>

  <text x="96" y="748" fill="#5B6470" font-family="Helvetica, Arial, sans-serif" font-size="16">The pipeline validates code, publishes images, and deploys to the local cluster that serves the app demo above.</text>
</svg>
