<svg width="1280" height="860" viewBox="0 0 1280 860" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1280" height="860" fill="#F7F4EE"/>
  <rect x="32" y="32" width="1216" height="796" rx="28" fill="#FFFDFC" stroke="#D7D0C5" stroke-width="2"/>

  <text x="72" y="96" fill="#1F2937" font-family="Helvetica, Arial, sans-serif" font-size="34" font-weight="700">Airbnb AI Chatbot Architecture</text>
  <text x="72" y="128" fill="#5B6470" font-family="Helvetica, Arial, sans-serif" font-size="18">Runtime request flow on top, deployment pipeline on the bottom.</text>

  <rect x="72" y="162" width="1136" height="284" rx="24" fill="#F4EFE6" stroke="#E1D7C9" stroke-width="2"/>
  <text x="98" y="204" fill="#9A5B2C" font-family="Helvetica, Arial, sans-serif" font-size="22" font-weight="700">Runtime Flow</text>

  <rect x="96" y="250" width="196" height="112" rx="22" fill="#FFF7ED" stroke="#F59E0B" stroke-width="2"/>
  <text x="194" y="296" text-anchor="middle" fill="#111827" font-family="Helvetica, Arial, sans-serif" font-size="22" font-weight="700">User Browser</text>
  <text x="194" y="326" text-anchor="middle" fill="#6B7280" font-family="Helvetica, Arial, sans-serif" font-size="17">Searches with natural</text>
  <text x="194" y="350" text-anchor="middle" fill="#6B7280" font-family="Helvetica, Arial, sans-serif" font-size="17">language queries</text>

  <rect x="344" y="228" width="250" height="156" rx="24" fill="#EFF6FF" stroke="#2563EB" stroke-width="2"/>
  <text x="469" y="276" text-anchor="middle" fill="#111827" font-family="Helvetica, Arial, sans-serif" font-size="26" font-weight="700">Frontend</text>
  <text x="469" y="306" text-anchor="middle" fill="#6B7280" font-family="Helvetica, Arial, sans-serif" font-size="18">React + Vite UI</text>
  <text x="469" y="332" text-anchor="middle" fill="#6B7280" font-family="Helvetica, Arial, sans-serif" font-size="18">Served by Nginx</text>
  <text x="469" y="358" text-anchor="middle" fill="#6B7280" font-family="Helvetica, Arial, sans-serif" font-size="18">Proxies /api to backend</text>

  <rect x="650" y="228" width="284" height="156" rx="24" fill="#F0FDF4" stroke="#16A34A" stroke-width="2"/>
  <text x="792" y="276" text-anchor="middle" fill="#111827" font-family="Helvetica, Arial, sans-serif" font-size="26" font-weight="700">Backend API</text>
  <text x="792" y="306" text-anchor="middle" fill="#6B7280" font-family="Helvetica, Arial, sans-serif" font-size="18">Spring Boot REST service</text>
  <text x="792" y="332" text-anchor="middle" fill="#6B7280" font-family="Helvetica, Arial, sans-serif" font-size="18">Calls OpenAI to extract</text>
  <text x="792" y="358" text-anchor="middle" fill="#6B7280" font-family="Helvetica, Arial, sans-serif" font-size="18">structured listing filters</text>

  <rect x="976" y="190" width="196" height="96" rx="22" fill="#FAF5FF" stroke="#7C3AED" stroke-width="2"/>
  <text x="1074" y="230" text-anchor="middle" fill="#111827" font-family="Helvetica, Arial, sans-serif" font-size="22" font-weight="700">OpenAI API</text>
  <text x="1074" y="254" text-anchor="middle" fill="#6B7280" font-family="Helvetica, Arial, sans-serif" font-size="15">Natural language</text>
  <text x="1074" y="274" text-anchor="middle" fill="#6B7280" font-family="Helvetica, Arial, sans-serif" font-size="15">to filters</text>

  <rect x="976" y="318" width="196" height="96" rx="22" fill="#FEF2F2" stroke="#DC2626" stroke-width="2"/>
  <text x="1074" y="358" text-anchor="middle" fill="#111827" font-family="Helvetica, Arial, sans-serif" font-size="22" font-weight="700">PostgreSQL</text>
  <text x="1074" y="382" text-anchor="middle" fill="#6B7280" font-family="Helvetica, Arial, sans-serif" font-size="15">Listing data +</text>
  <text x="1074" y="402" text-anchor="middle" fill="#6B7280" font-family="Helvetica, Arial, sans-serif" font-size="15">quiet scores</text>

  <line x1="292" y1="306" x2="344" y2="306" stroke="#6B7280" stroke-width="4" stroke-linecap="round"/>
  <polygon points="344,306 330,298 330,314" fill="#6B7280"/>

