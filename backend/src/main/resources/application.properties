# Spring Boot application properties
server.port = 8000

# Local overrides (gitignored): copy application-local.properties.example to application-local.properties and add your key
spring.profiles.active=local

# DataSource configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/airbnb_chatbot
spring.datasource.username=summer
spring.datasource.password=
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate settings
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# OpenAI API key (read from environment variable)
openai.api.key=${OPENAI_API_KEY}